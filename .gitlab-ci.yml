# Use a glibc-based image for JavaSMT/Z3 native libraries.
image: gradle:jdk17

stages:
  - build
  - test
  - review
  - deploy

before_script:
  - apt-get update && apt-get install -y --no-install-recommends z3 libz3-dev libz3-java zip
  - export JAVA_TOOL_OPTIONS="-Djava.library.path=/usr/lib:/usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu/jni"
  - export LD_LIBRARY_PATH="/usr/lib:/usr/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu/jni:${LD_LIBRARY_PATH:-}"
  - find /usr -name 'libz3java.so*' -o -name 'libz3.so*' | sort
  - GRADLE_USER_HOME="$(pwd)/.gradle"
  - export GRADLE_USER_HOME

check:
  stage: build
  script: ./gradlew checkstyleMain checkstyleTest
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

compile-agent:
  stage: build
  script: ./gradlew :agent:compileJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

compile-core:
  stage: build
  script: ./gradlew :core:compileJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

compile-integration-test:
  stage: build
  script: ./gradlew :integration-test:compileTestJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

test:
  stage: test
  # Test-stage timeout, increased by 20 minutes (60m default -> 1h 20m).
  timeout: 1h 20m
  script:
    - |
      set -eu
      TEST_FILES=$(find integration-test/src/test/java -name "*Test.java" \
        -exec grep -l -E "^[[:space:]]*@JmcCheck|^[[:space:]]*@Test" {} + \
        | sort)
      if [ -z "$TEST_FILES" ]; then
        echo "No test classes found under integration-test/src/test/java."
        exit 0
      fi
      TEST_METHODS=$(for FILE in $TEST_FILES; do
        CLASS_NAME=$(printf "%s" "$FILE" | sed 's|integration-test/src/test/java/||; s|/|.|g; s|\.java$||')
        awk -v className="$CLASS_NAME" '
          BEGIN { in_block=0; want=0; disabled=0 }
          {
            line=$0
            if (in_block) {
              if (line ~ /\*\//) { sub(/^.*\*\//, "", line); in_block=0 } else { next }
            }
            if (line ~ /\/\*/) { in_block=1; sub(/\/\*.*$/, "", line) }
            sub(/^[[:space:]]+/, "", line)
            if (line ~ /^\/\// || line == "") { next }
          }
          /^[[:space:]]*@Disabled/ { disabled=1; next }
          /^[[:space:]]*@JmcCheck/ { want=1; next }
          /^[[:space:]]*@Test/ { want=1; next }
          want && $0 ~ /void[[:space:]]+[[:alnum:]_]+[[:space:]]*\(/ {
            if (!disabled) {
              line=$0
              sub(/^.*void[[:space:]]+/, "", line)
              sub(/[[:space:]]*\(.*/, "", line)
              print className "." line
            }
            want=0
            disabled=0
          }
        ' "$FILE"
      done)
      if [ -z "$TEST_METHODS" ]; then
        echo "No test methods found under integration-test/src/test/java."
        exit 0
      fi
      # Per-method wall-clock hang guard. Defaults to 30s; override with a
      # PER_TEST_TIMEOUT CI/CD variable. A stuck test is killed (SIGTERM, then
      # SIGKILL 30s later) so one deadlock can't consume the whole job timeout.
      # Timed-out/failed tests are summarised at the end and fail the job, but
      # the rest of the suite still runs.
      PER_TEST_TIMEOUT="${PER_TEST_TIMEOUT:-30}"
      TIMED_OUT=""
      FAILED=""
      for TEST_METHOD in $TEST_METHODS; do
        echo ">>> running $TEST_METHOD (timeout ${PER_TEST_TIMEOUT}s)"
        rc=0
        timeout -k 30s "${PER_TEST_TIMEOUT}s" \
          ./gradlew --no-daemon :integration-test:test --tests "$TEST_METHOD" || rc=$?
        if [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
          echo ">>> TIMEOUT after ${PER_TEST_TIMEOUT}s: $TEST_METHOD"
          TIMED_OUT="${TIMED_OUT}${TIMED_OUT:+ }$TEST_METHOD"
        elif [ "$rc" -ne 0 ]; then
          echo ">>> FAILED (exit $rc): $TEST_METHOD"
          FAILED="${FAILED}${FAILED:+ }$TEST_METHOD"
        fi
      done
      echo "===================== test summary ====================="
      if [ -n "$TIMED_OUT" ]; then
        echo "Timed out (> ${PER_TEST_TIMEOUT}s):"
        for t in $TIMED_OUT; do echo "  - $t"; done
      fi
      if [ -n "$FAILED" ]; then
        echo "Failed:"
        for t in $FAILED; do echo "  - $t"; done
      fi
      if [ -n "$TIMED_OUT" ] || [ -n "$FAILED" ]; then
        exit 1
      fi
      echo "All executed tests passed within ${PER_TEST_TIMEOUT}s."
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  artifacts:
    when: always
    paths:
      - integration-test/build/test-results/test**/TEST-*.xml
    reports:
      junit: integration-test/build/test-results/test/**/TEST-*.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

publish:
  stage: deploy
  script:
    - bash ./scripts/publish.sh
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  artifacts:
    paths:
      - build/jmc-agent/jmc-agent.zip
      - build/jmc/jmc.zip
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  when: on_success