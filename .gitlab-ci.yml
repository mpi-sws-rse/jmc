image: gradle:jdk17-alpine

before_script:
  - GRADLE_USER_HOME="$(pwd)/.gradle"
  - export GRADLE_USER_HOME

check:
  stage: build
  script: ./gradlew checkstyleMain checkstyleTest
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"


compile-agent:
  stage: build
  script: ./gradlew :agent:compileJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

compile-core:
  stage: build
  script: ./gradlew :core:compileJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

compile-integration-test:
  stage: build
  script: ./gradlew :integration-test:compileTestJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

test:
  stage: test
  script:
    # Run each test class in its own Gradle invocation to avoid shared static state.
    - |
      set -eu
      TEST_FILES=$(find integration-test/src/test/java -name "*Test.java" \
        -exec grep -l -E "^[[:space:]]*@JmcCheck|^[[:space:]]*@Test" {} + \
        | sort)
      if [ -z "$TEST_FILES" ]; then
        echo "No test classes found under integration-test/src/test/java."
        exit 0
      fi
      TEST_CLASSES=$(printf "%s\n" "$TEST_FILES" \
        | sed 's|integration-test/src/test/java/||; s|/|.|g; s|\.java$||')
      for TEST_CLASS in $TEST_CLASSES; do
        ./gradlew --no-daemon :integration-test:test --tests "$TEST_CLASS"
      done
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  artifacts:
    when: always
    paths:
      - integration-test/build/test-results/test**/TEST-*.xml
    reports:
      junit: integration-test/build/test-results/test/**/TEST-*.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

publish:
  stage: deploy
  before_script:
    - apk update && apk add bash zip
  script:
    - bash ./scripts/publish.sh
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  artifacts:
    paths:
      - build/jmc-agent/jmc-agent.zip
      - build/jmc/jmc.zip
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: on_success