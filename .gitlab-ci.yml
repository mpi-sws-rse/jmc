image: gradle:jdk17-alpine

stages:
  - build
  - test
  - review
  - deploy

before_script:
  - GRADLE_USER_HOME="$(pwd)/.gradle"
  - export GRADLE_USER_HOME

check:
  stage: build
  script: ./gradlew checkstyleMain checkstyleTest
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

compile-agent:
  stage: build
  script: ./gradlew :agent:compileJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

compile-core:
  stage: build
  script: ./gradlew :core:compileJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

compile-integration-test:
  stage: build
  script: ./gradlew :integration-test:compileTestJava
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle

test:
  stage: test
  script:
    - |
      set -eu
      TEST_FILES=$(find integration-test/src/test/java -name "*Test.java" \
        -exec grep -l -E "^[[:space:]]*@JmcCheck|^[[:space:]]*@Test" {} + \
        | sort)
      if [ -z "$TEST_FILES" ]; then
        echo "No test classes found under integration-test/src/test/java."
        exit 0
      fi
      TEST_METHODS=$(for FILE in $TEST_FILES; do
        CLASS_NAME=$(printf "%s" "$FILE" | sed 's|integration-test/src/test/java/||; s|/|.|g; s|\.java$||')
        awk -v className="$CLASS_NAME" '
          BEGIN { in_block=0; want=0; disabled=0 }
          {
            line=$0
            if (in_block) {
              if (line ~ /\*\//) { sub(/^.*\*\//, "", line); in_block=0 } else { next }
            }
            if (line ~ /\/\*/) { in_block=1; sub(/\/\*.*$/, "", line) }
            sub(/^[[:space:]]+/, "", line)
            if (line ~ /^\/\// || line == "") { next }
          }
          /^[[:space:]]*@Disabled/ { disabled=1; next }
          /^[[:space:]]*@JmcCheck/ { want=1; next }
          /^[[:space:]]*@Test/ { want=1; next }
          want && $0 ~ /void[[:space:]]+[[:alnum:]_]+[[:space:]]*\(/ {
            if (!disabled) {
              line=$0
              sub(/^.*void[[:space:]]+/, "", line)
              sub(/[[:space:]]*\(.*/, "", line)
              print className "." line
            }
            want=0
            disabled=0
          }
        ' "$FILE"
      done)
      if [ -z "$TEST_METHODS" ]; then
        echo "No test methods found under integration-test/src/test/java."
        exit 0
      fi
      for TEST_METHOD in $TEST_METHODS; do
        ./gradlew --no-daemon :integration-test:test --tests "$TEST_METHOD"
      done
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  artifacts:
    when: always
    paths:
      - integration-test/build/test-results/test**/TEST-*.xml
    reports:
      junit: integration-test/build/test-results/test/**/TEST-*.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

claude_review:
  stage: review
  image: node:24-alpine3.21
  allow_failure: true
  before_script:
    - apk update
    - apk add --no-cache git bash
    - npm install -g @anthropic-ai/claude-code@1.0.117
  script:
    - echo "Running Claude review on the full MR diff..."
    - |
      set -eu
      if [ -z "${CI_MERGE_REQUEST_DIFF_BASE_SHA:-}" ]; then
        echo "CI_MERGE_REQUEST_DIFF_BASE_SHA is missing; this job must run in a merge request pipeline."
        exit 1
      fi
      git fetch --unshallow || true
      git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --depth=2000 || true
      BASE_SHA="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
      HEAD_SHA="$CI_COMMIT_SHA"
      git diff --no-ext-diff "$BASE_SHA" "$HEAD_SHA" > mr.diff
      claude \
        -p "Read ./AGENTS.md first, then review the full merge request diff contained in mr.diff. This MR may include many commits, so review the complete patch rather than only the latest commit. Focus on bugs, risky logic, security issues, missing tests, and confusing code. Do not modify files. Do not create commits. Do not push changes. If you find issues, explain them briefly and clearly." \
        --allowedTools "Read,Grep,Glob" > claude-review.txt
      echo "----- Claude review output -----"
      cat claude-review.txt
  artifacts:
    when: always
    paths:
      - claude-review.txt
      - mr.diff
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

publish:
  stage: deploy
  before_script:
    - apk update && apk add bash zip
  script:
    - bash ./scripts/publish.sh
  cache:
    key: "$CI_COMMIT_REF_NAME"
    policy: push
    paths:
      - build
      - .gradle
  artifacts:
    paths:
      - build/jmc-agent/jmc-agent.zip
      - build/jmc/jmc.zip
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: on_success